name: Build Scheme Plugin System

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build build-essential uuid-dev
          pip install meson

      - name: Build Chez Scheme
        run: |
          cd chezscheme
          CFLAGS="-fPIC -O2 -D_REENTRANT -pthread" ./configure --disable-x11 --disable-curses
          make -j$(nproc)

      - name: Verify chezscheme build
        run: |
          echo "=== Arch dirs ==="
          ls -d chezscheme/*/boot/*/libkernel.a 2>/dev/null || echo "NO LIBS FOUND"
          echo "=== c dir ==="
          ls chezscheme/c/ 2>/dev/null | head -3 || echo "NO c DIR"
          echo "=== meson version ==="
          meson --version

      - name: Meson setup
        run: |
          rm -rf builddir
          meson setup builddir --backend=ninja

      - name: Meson compile
        run: meson compile -C builddir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scheme-plugin-artifacts
          path: |
            builddir/libschemeplugin.so
            builddir/libschemeplugin-dev.so
            builddir/scheme-plugin-host
